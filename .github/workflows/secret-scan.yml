name: secret-scan

# Security gate: scan the full repo (and its history) for committed secrets on every
# push and pull request. A hit fails the check so a leaked credential can't merge.
# See SECURITY.md for the project's leak-prevention commitments.

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # scan all commits, not just the tip

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # gitleaks-action is free for personal repos and public repos.
          # For an ORGANIZATION-owned repo, set a GITLEAKS_LICENSE secret:
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
